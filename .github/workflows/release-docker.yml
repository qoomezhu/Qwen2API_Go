name: release-docker

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag to build and publish, for example v0.2.0
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build and publish, for example v0.2.0
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Prepare image list
        id: images
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          images="ghcr.io/${REPOSITORY,,}"
          if [ -n "${DOCKERHUB_IMAGE}" ]; then
            images="${images}"$'\n'"${DOCKERHUB_IMAGE}"
          fi

          {
            echo "list<<EOF"
            echo "${images}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.list }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag_name }}
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
